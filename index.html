<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdCashGlobal | Secure Auth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { background-color: #0d1117; font-family: 'Inter', sans-serif; color: white; }
        .premium-bg { background: radial-gradient(circle at top right, #1e293b, #0d1117); }
        .card-glass { background: #161b22; border: 1px solid #30363d; }
        .btn-green { background-color: #00e676; color: #000; transition: 0.3s; font-weight: bold; }
        .btn-green:hover { background-color: #00c853; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0, 230, 118, 0.2); }
        .social-btn { background-color: #ffffff; color: #000; transition: 0.3s; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body class="premium-bg min-h-screen flex flex-col items-center justify-center p-4">

    <div class="mb-10 text-3xl font-bold flex items-center gap-2">
        <span class="text-[#00e676]"><i class="fas fa-bolt"></i></span> AdCashGlobal
    </div>

    <div class="max-w-6xl w-full grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
        <div class="space-y-8 hidden lg:block">
            <h1 class="text-5xl font-extrabold leading-tight">Get <span class="text-[#00e676]">paid</span> for watching ads</h1>
            <p class="text-slate-400 text-lg">Join the fastest growing earning platform and start earning today.</p>
        </div>

        <div class="card-glass p-8 rounded-2xl w-full max-w-md mx-auto shadow-2xl">
            <div class="flex justify-between mb-8 border-b border-gray-800 pb-4">
                <button id="tab-signup-btn" class="text-xl font-bold text-white border-b-2 border-[#00e676] pb-2">Sign Up</button>
                <button id="tab-login-btn" class="text-xl font-bold text-gray-500 pb-2">Login</button>
            </div>

            <form id="signup-form" class="space-y-5">
                <input type="text" id="reg-name" placeholder="Full Name" class="w-full bg-[#0d1117] border border-gray-700 p-3 rounded-lg outline-none focus:border-[#00e676] text-white" required>
                <input type="email" id="reg-email" placeholder="Email Address" class="w-full bg-[#0d1117] border border-gray-700 p-3 rounded-lg outline-none focus:border-[#00e676] text-white" required>
                <input type="password" id="reg-password" placeholder="Password (Min 6 chars)" class="w-full bg-[#0d1117] border border-gray-700 p-3 rounded-lg outline-none focus:border-[#00e676] text-white" minlength="6" required>
                <button type="submit" class="w-full btn-green py-3 rounded-lg uppercase tracking-wide">Join Now</button>
            </form>

            <form id="login-form" class="space-y-5 hidden">
                <input type="email" id="login-email" placeholder="Email Address" class="w-full bg-[#0d1117] border border-gray-700 p-3 rounded-lg outline-none focus:border-[#00e676] text-white" required>
                <input type="password" id="login-password" placeholder="Password" class="w-full bg-[#0d1117] border border-gray-700 p-3 rounded-lg outline-none focus:border-[#00e676] text-white" required>
                <button type="submit" class="w-full btn-green py-3 rounded-lg uppercase tracking-wide">Login</button>
            </form>

            <div class="relative flex py-6 items-center">
                <div class="flex-grow border-t border-gray-800"></div>
                <span class="flex-shrink mx-4 text-gray-600 text-sm font-bold">OR</span>
                <div class="flex-grow border-t border-gray-800"></div>
            </div>

            <button id="google-btn" class="w-full social-btn flex items-center justify-center gap-3 py-3 rounded-lg font-semibold">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="h-5"> Continue with Google
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBfy99qWpkOHd5VO6IIeDHhSxXONnMTXUA",
            authDomain: "adcashglobal-c5274.firebaseapp.com",
            projectId: "adcashglobal-c5274",
            storageBucket: "adcashglobal-c5274.firebasestorage.app",
            messagingSenderId: "485189038688",
            appId: "1:485189038688:web:27244eea22a161418c4905",
            measurementId: "G-VYGC8JV7W0",
            databaseURL: "https://adcashglobal-c5274-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();

        // ইউজার লগইন থাকলে ড্যাশবোর্ডে নিয়ে যাবে
        onAuthStateChanged(auth, (user) => {
            if (user) window.location.href = "dashboard.html";
        });

        // নতুন ইউজার তৈরি হলে ডাটাবেসে প্রোফাইল সেভ করা
        const createUserProfile = async (user, name) => {
            const userRef = ref(db, 'users/' + user.uid);
            const snapshot = await get(userRef);
            if (!snapshot.exists()) {
                await set(userRef, {
                    username: name || user.displayName || "User",
                    email: user.email,
                    balance: 0.00,
                    joinedAt: new Date().toISOString()
                });
            }
        };

        // সাইন আপ লজিক
        document.getElementById('signup-form').onsubmit = async (e) => {
            e.preventDefault();
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            try {
                const res = await createUserWithEmailAndPassword(auth, email, password);
                await updateProfile(res.user, { displayName: name });
                await createUserProfile(res.user, name);
                alert("Account Created Successfully!");
            } catch (err) { alert(err.message); }
        };

        // লগইন লজিক
        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (err) { alert(err.message); }
        };

        // গুগল লগইন লজিক
        document.getElementById('google-btn').onclick = async () => {
            try { 
                const res = await signInWithPopup(auth, provider);
                await createUserProfile(res.user);
            } 
            catch (err) { alert(err.message); }
        };
    </script>

    <script>
        const sForm = document.getElementById('signup-form'), lForm = document.getElementById('login-form');
        const sBtn = document.getElementById('tab-signup-btn'), lBtn = document.getElementById('tab-login-btn');

        lBtn.onclick = () => {
            sForm.classList.add('hidden'); lForm.classList.remove('hidden');
            lBtn.classList.add('border-b-2', 'border-[#00e676]', 'text-white');
            sBtn.classList.remove('border-b-2', 'border-[#00e676]', 'text-white');
            sBtn.classList.add('text-gray-500');
        };
        sBtn.onclick = () => {
            lForm.classList.add('hidden'); sForm.classList.remove('hidden');
            sBtn.classList.add('border-b-2', 'border-[#00e676]', 'text-white');
            lBtn.classList.remove('border-b-2', 'border-[#00e676]', 'text-white');
            lBtn.classList.add('text-gray-500');
        };
    </script>
</body>
</html>
