<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard | AdCashGlobal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; font-family: 'Inter', sans-serif; color: white; }
        .sidebar-item-active { background-color: #161b22; color: #00e676; border-right: 3px solid #00e676; }
        .sidebar-item:hover { background-color: #161b22; color: #00e676; border-right: 3px solid #00e676; }
        .card-bg { background-color: #161b22; border: 1px solid #30363d; }
        .neon-text { color: #00e676; }
        .neon-btn { background-color: #00e676; color: #000; transition: 0.3s; display: block; text-align: center; }
        .neon-btn:hover { box-shadow: 0 0 15px rgba(0, 230, 118, 0.4); transform: translateY(-2px); }
        #loader { position: fixed; inset: 0; background: #0d1117; z-index: 50; display: flex; items-center: center; justify-content: center; }
    </style>
</head>
<body class="flex flex-col md:flex-row min-h-screen">

    <div id="loader"><div class="animate-spin rounded-full h-12 w-12 border-t-2 border-[#00e676]"></div></div>

    <nav class="w-full md:w-64 card-bg flex flex-col p-5 space-y-6">
        <div class="text-2xl font-bold flex items-center gap-2 mb-8 cursor-pointer" onclick="location.href='index.html'">
            <span class="neon-text"><i class="fas fa-bolt"></i></span> AdCashGlobal
        </div>
        
        <div class="flex flex-col space-y-2">
            <a href="dashboard.html" class="sidebar-item sidebar-item-active p-3 rounded-lg flex items-center gap-3 transition-all">
                <i class="fas fa-th-large w-5"></i> Dashboard
            </a>
            <a href="tasks.html" class="sidebar-item p-3 rounded-lg flex items-center gap-3 transition-all text-gray-400">
                <i class="fas fa-tasks w-5"></i> Tasks
            </a>
            <a href="wallet.html" class="sidebar-item p-3 rounded-lg flex items-center gap-3 transition-all text-gray-400">
                <i class="fas fa-wallet w-5"></i> Wallet
            </a>
            <a href="ranking.html" class="sidebar-item p-3 rounded-lg flex items-center gap-3 transition-all text-gray-400">
                <i class="fas fa-trophy w-5"></i> Ranking
            </a>
        </div>

        <div class="mt-auto p-4 border-t border-gray-800">
            <div class="flex items-center gap-3 mb-4">
                <img id="user-img" src="https://ui-avatars.com/api/?name=User" class="rounded-full h-10 w-10 border border-[#00e676]">
                <div class="overflow-hidden">
                    <p id="user-name" class="text-sm font-bold truncate">Loading...</p>
                    <p id="user-status" class="text-[10px] text-[#00e676]">Active Account</p>
                </div>
            </div>
            <button onclick="logout()" class="w-full text-xs text-red-500 bg-red-500/10 py-2 rounded-lg hover:bg-red-500 hover:text-white transition-all">
                <i class="fas fa-sign-out-alt mr-1"></i> Logout
            </button>
        </div>
    </nav>

    <main class="flex-1 p-6 md:p-10 space-y-8 overflow-y-auto">
        
        <header class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="card-bg p-6 rounded-2xl flex justify-between items-center">
                <div>
                    <p class="text-gray-400 text-xs uppercase">Your Balance</p>
                    <h2 id="balance-display" class="text-3xl font-bold neon-text">$0.0000</h2>
                </div>
                <div class="bg-green-500/10 p-3 rounded-xl"><i class="fas fa-dollar-sign text-[#00e676]"></i></div>
            </div>
            <div class="card-bg p-6 rounded-2xl flex justify-between items-center border-t-2 border-blue-500">
                <div>
                    <p class="text-gray-400 text-xs uppercase">Today's Earnings</p>
                    <h2 id="today-earning" class="text-3xl font-bold">$0.0000</h2>
                </div>
                <div class="bg-blue-500/10 p-3 rounded-xl"><i class="fas fa-chart-line text-blue-500"></i></div>
            </div>
            <div class="card-bg p-6 rounded-2xl flex justify-between items-center border-t-2 border-purple-500">
                <div>
                    <p class="text-gray-400 text-xs uppercase">Referral Count</p>
                    <h2 id="ref-count" class="text-3xl font-bold">0</h2>
                </div>
                <div class="bg-purple-500/10 p-3 rounded-xl"><i class="fas fa-users text-purple-500"></i></div>
            </div>
        </header>

        <section>
            <h3 class="text-xl font-bold mb-6 flex items-center gap-2">
                <i class="fas fa-star text-yellow-500 text-sm"></i> Featured Ways to Earn
            </h3>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="card-bg p-8 rounded-3xl text-center group hover:border-[#00e676] transition-all">
                    <div class="h-16 w-16 bg-red-500/10 rounded-full flex items-center justify-center mx-auto mb-4 group-hover:scale-110">
                        <i class="fas fa-play text-red-500 text-2xl"></i>
                    </div>
                    <h4 class="text-lg font-bold mb-2">Watch Video</h4>
                    <a href="watch-video.html" class="neon-btn w-full font-bold py-2 rounded-xl">Watch Now</a>
                </div>

                <div class="card-bg p-8 rounded-3xl text-center group hover:border-[#00e676] transition-all">
                    <div class="h-16 w-16 bg-yellow-500/10 rounded-full flex items-center justify-center mx-auto mb-4 group-hover:rotate-45">
                        <i class="fas fa-dharmachakra text-yellow-500 text-2xl"></i>
                    </div>
                    <h4 class="text-lg font-bold mb-2">Lucky Spin</h4>
                    <a href="lucky-spin.html" class="neon-btn w-full font-bold py-2 rounded-xl">Spin Wheel</a>
                </div>

                <div class="card-bg p-8 rounded-3xl text-center group hover:border-[#00e676] transition-all">
                    <div class="h-16 w-16 bg-blue-500/10 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i class="fas fa-keyboard text-blue-500 text-2xl"></i>
                    </div>
                    <h4 class="text-lg font-bold mb-2">Solve Captcha</h4>
                    <a href="captcha.html" class="neon-btn w-full font-bold py-2 rounded-xl">Solve Now</a>
                </div>
            </div>
        </section>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // 🚨 YOUR CONFIG HERE
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // Authentication & Data Sync
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Update Sidebar Profile
                document.getElementById('user-name').innerText = user.displayName || "User Account";
                if(user.photoURL) document.getElementById('user-img').src = user.photoURL;

                // Sync Database (Balance & Earnings)
                const userRef = ref(db, 'users/' + user.uid);
                onValue(userRef, (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        document.getElementById('balance-display').innerText = '$' + (data.balance || 0).toFixed(4);
                        document.getElementById('today-earning').innerText = '$' + (data.today_earning || 0).toFixed(4);
                        document.getElementById('ref-count').innerText = data.referrals || 0;
                    }
                });

                document.getElementById('loader').style.display = 'none';
            } else {
                window.location.href = "index.html"; // Redirect to login
            }
        });

        // Logout Function
        window.logout = () => {
            signOut(auth).then(() => window.location.href = "index.html");
        };
    </script>
</body>
</html>
