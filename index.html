<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdCashGlobal | Login & Signup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { background-color: #0d1117; font-family: 'Inter', sans-serif; color: white; margin: 0; }
        .premium-bg { background: radial-gradient(circle at top right, #1e293b, #0d1117); min-height: 100vh; }
        .card-glass { background: rgba(22, 27, 34, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(48, 54, 61, 0.7); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .btn-green { background: linear-gradient(135deg, #00e676, #00c853); color: #000; font-weight: 700; transition: 0.3s; }
        .btn-green:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0, 230, 118, 0.3); }
        .input-field { background: #0d1117; border: 1px solid #30363d; color: white; transition: 0.3s; }
        .input-field:focus { border-color: #00e676; outline: none; box-shadow: 0 0 0 2px rgba(0, 230, 118, 0.1); }
        .hidden { display: none; }
    </style>
</head>
<body class="premium-bg flex flex-col items-center justify-center p-6">

    <div class="mb-8 text-4xl font-black flex items-center gap-3">
        <div class="bg-[#00e676] p-2 rounded-xl text-black"><i class="fas fa-bolt"></i></div>
        <span>AdCash<span class="text-[#00e676]">Global</span></span>
    </div>

    <div class="card-glass p-8 rounded-[2rem] w-full max-w-md">
        <div class="flex justify-around mb-10">
            <button id="tab-signup-btn" class="text-lg font-bold text-white border-b-4 border-[#00e676] pb-2 px-4 transition-all">Sign Up</button>
            <button id="tab-login-btn" class="text-lg font-bold text-gray-500 pb-2 px-4 transition-all">Login</button>
        </div>

        <form id="signup-form" class="space-y-5">
            <input type="text" id="reg-name" placeholder="Full Name" class="input-field w-full p-4 rounded-2xl" required>
            <input type="email" id="reg-email" placeholder="Email Address" class="input-field w-full p-4 rounded-2xl" required>
            <input type="password" id="reg-password" placeholder="Password (6+ chars)" class="input-field w-full p-4 rounded-2xl" minlength="6" required>
            <button type="submit" id="signup-btn" class="w-full btn-green py-4 rounded-2xl uppercase tracking-widest text-sm">Create Account</button>
        </form>

        <form id="login-form" class="space-y-5 hidden">
            <input type="email" id="login-email" placeholder="Email Address" class="input-field w-full p-4 rounded-2xl" required>
            <input type="password" id="login-password" placeholder="Password" class="input-field w-full p-4 rounded-2xl" required>
            <button type="submit" id="login-btn" class="w-full btn-green py-4 rounded-2xl uppercase tracking-widest text-sm">Login Securely</button>
        </form>

        <div class="relative flex py-8 items-center">
            <div class="flex-grow border-t border-gray-800"></div>
            <span class="mx-4 text-gray-600 text-[10px] font-bold tracking-[0.2em]">OR CONNECT WITH</span>
            <div class="flex-grow border-t border-gray-800"></div>
        </div>

        <button id="google-btn" class="w-full bg-white text-black flex items-center justify-center gap-3 py-4 rounded-2xl font-bold hover:bg-gray-100 transition-all">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="h-5"> Google
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, updateProfile, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBfy99qWpkOHd5VO6IIeDHhSxXONnMTXUA",
            authDomain: "adcashglobal-c5274.firebaseapp.com",
            projectId: "adcashglobal-c5274",
            storageBucket: "adcashglobal-c5274.firebasestorage.app",
            messagingSenderId: "485189038688",
            appId: "1:485189038688:web:27244eea22a161418c4905",
            measurementId: "G-VYGC8JV7W0",
            databaseURL: "https://adcashglobal-c5274-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();

        // সেশন সেভ করা
        setPersistence(auth, browserLocalPersistence);

        // রিডাইরেক্ট ফাংশন (অবশ্যই dashboard.html থাকতে হবে)
        const redirect = () => { window.location.replace("dashboard.html"); };

        onAuthStateChanged(auth, (user) => {
            if (user) redirect();
        });

        const saveUser = async (user, name) => {
            const userRef = ref(db, 'users/' + user.uid);
            const snap = await get(userRef);
            if (!snap.exists()) {
                await set(userRef, {
                    username: name || user.displayName || "User",
                    email: user.email,
                    balance: 0.00,
                    joinedAt: new Date().toISOString()
                });
            }
        };

        // Form Actions
        document.getElementById('signup-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('signup-btn');
            btn.disabled = true; btn.innerText = "Processing...";
            try {
                const res = await createUserWithEmailAndPassword(auth, e.target[1].value, e.target[2].value);
                await updateProfile(res.user, { displayName: e.target[0].value });
                await saveUser(res.user, e.target[0].value);
                redirect();
            } catch (err) { alert(err.message); btn.disabled = false; btn.innerText = "Create Account"; }
        };

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            btn.disabled = true; btn.innerText = "Checking...";
            try {
                await signInWithEmailAndPassword(auth, e.target[0].value, e.target[1].value);
                redirect();
            } catch (err) { alert(err.message); btn.disabled = false; btn.innerText = "Login Securely"; }
        };

        document.getElementById('google-btn').onclick = async () => {
            try {
                const res = await signInWithPopup(auth, provider);
                await saveUser(res.user);
                redirect();
            } catch (err) { alert(err.message); }
        };
    </script>

    <script>
        // Tab switching
        const sF = document.getElementById('signup-form'), lF = document.getElementById('login-form');
        const sB = document.getElementById('tab-signup-btn'), lB = document.getElementById('tab-login-btn');
        lB.onclick = () => { sF.classList.add('hidden'); lF.classList.remove('hidden'); lB.className = "text-lg font-bold text-white border-b-4 border-[#00e676] pb-2 px-4"; sB.className = "text-lg font-bold text-gray-500 pb-2 px-4"; };
        sB.onclick = () => { lF.classList.add('hidden'); sF.classList.remove('hidden'); sB.className = "text-lg font-bold text-white border-b-4 border-[#00e676] pb-2 px-4"; lB.className = "text-lg font-bold text-gray-500 pb-2 px-4"; };
    </script>
</body>
</html>
