<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Access | Earning Site</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(45deg, #0f172a, #1e293b);
            font-family: 'Inter', sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .input-gradient:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="glass-card w-full max-auto max-w-md rounded-2xl p-8 transition-all duration-500">
        
        <div class="flex justify-center mb-8 bg-slate-800/50 rounded-lg p-1">
            <button id="loginBtn" class="w-1/2 py-2 text-white font-semibold rounded-md bg-blue-600 shadow-lg transition-all" onclick="showForm('login')">Login</button>
            <button id="signupBtn" class="w-1/2 py-2 text-slate-400 font-semibold rounded-md hover:text-white transition-all" onclick="showForm('signup')">Sign Up</button>
        </div>

        <form id="loginForm" class="space-y-6">
            <h2 class="text-3xl font-bold text-white text-center mb-2">Welcome Back</h2>
            <p class="text-slate-400 text-center text-sm">Start earning by watching videos</p>
            
            <div class="space-y-4">
                <div class="relative">
                    <i class="fas fa-envelope absolute left-3 top-4 text-slate-500"></i>
                    <input type="email" placeholder="Email Address" class="w-full bg-slate-900/50 border border-slate-700 text-white rounded-lg py-3 px-10 outline-none input-gradient transition-all" required>
                </div>
                <div class="relative">
                    <i class="fas fa-lock absolute left-3 top-4 text-slate-500"></i>
                    <input type="password" placeholder="Password" class="w-full bg-slate-900/50 border border-slate-700 text-white rounded-lg py-3 px-10 outline-none input-gradient transition-all" required>
                </div>
            </div>

            <div class="flex items-center justify-between text-xs text-slate-400">
                <label class="flex items-center"><input type="checkbox" class="mr-2"> Remember me</label>
                <a href="#" class="hover:text-blue-400">Forgot Password?</a>
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-all transform hover:scale-[1.02] active:scale-95 shadow-lg shadow-blue-500/20">
                Sign In
            </button>
        </form>

        <form id="signupForm" class="hidden space-y-6">
            <h2 class="text-3xl font-bold text-white text-center mb-2">Create Account</h2>
            <p class="text-slate-400 text-center text-sm">Join to earn from USA & BD ads</p>
            
            <div class="space-y-4">
                <div class="relative">
                    <i class="fas fa-user absolute left-3 top-4 text-slate-500"></i>
                    <input type="text" placeholder="Full Name" class="w-full bg-slate-900/50 border border-slate-700 text-white rounded-lg py-3 px-10 outline-none input-gradient transition-all" required>
                </div>
                <div class="relative">
                    <i class="fas fa-envelope absolute left-3 top-4 text-slate-500"></i>
                    <input type="email" placeholder="Email Address" class="w-full bg-slate-900/50 border border-slate-700 text-white rounded-lg py-3 px-10 outline-none input-gradient transition-all" required>
                </div>
                <div class="relative">
                    <i class="fas fa-lock absolute left-3 top-4 text-slate-500"></i>
                    <input type="password" placeholder="Password" class="w-full bg-slate-900/50 border border-slate-700 text-white rounded-lg py-3 px-10 outline-none input-gradient transition-all" required>
                </div>
            </div>

            <p class="text-[10px] text-slate-500 text-center">By signing up, you agree to our Terms and Anti-Fraud Policy.</p>

            <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-lg transition-all transform hover:scale-[1.02] active:scale-95 shadow-lg shadow-emerald-500/20">
                Create Free Account
            </button>
        </form>

        <div class="mt-8 text-center">
            <div class="relative flex py-5 items-center">
                <div class="flex-grow border-t border-slate-700"></div>
                <span class="flex-shrink mx-4 text-slate-500 text-xs uppercase">Or continue with</span>
                <div class="flex-grow border-t border-slate-700"></div>
            </div>
            <div class="flex justify-center space-x-4">
                <button class="p-2 w-full bg-slate-800/50 border border-slate-700 rounded-lg text-white hover:bg-slate-700 transition-all"><i class="fab fa-google"></i> Google</button>
            </div>
        </div>
    </div>

    <script>
        function showForm(type) {
            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');
            const loginBtn = document.getElementById('loginBtn');
            const signupBtn = document.getElementById('signupBtn');

            if (type === 'login') {
                loginForm.classList.remove('hidden');
                signupForm.classList.add('hidden');
                loginBtn.classList.add('bg-blue-600', 'text-white');
                loginBtn.classList.remove('text-slate-400');
                signupBtn.classList.remove('bg-blue-600', 'text-white');
                signupBtn.classList.add('text-slate-400');
            } else {
                loginForm.classList.add('hidden');
                signupForm.classList.remove('hidden');
                signupBtn.classList.add('bg-blue-600', 'text-white');
                signupBtn.classList.remove('text-slate-400');
                loginBtn.classList.remove('bg-blue-600', 'text-white');
                loginBtn.classList.add('text-slate-400');
            }
        }
    </script>
</body>
</html>
